<html>
    <head>
        <title>Scheduler</title>
        <style>
html,body {
    font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
}
@media not print {
    #schedule>div {
        display: inline-block;
    }
}
@media print {
    #top {
        display: none;
    }
}
        </style>
    </head>
    <body>
        <div id="top">
            <input id="file-select" name="file-select" type="file" accept=".json" />
            <span id="nav">
                <input id="prev" name="prev" type="button" value="<" />
                <span id="curr"></span>
                <input id="next" name="next" type="button" value=">" />
            </span>
        </div>
        <div id="schedule">

        </div>
        <script
            src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"
            integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i"
            crossorigin="anonymous"
        ></script>
        <script type="text/javascript">
var root_json = null;
var locations = null;
var curr_index = -1;

const getHashCode = (str) => {
    let h1 = 0x10293847;
    let h2 = 0xfeedf00d;
    for (let i = 0, ch; i < str.length; i++) {
        ch = str.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1  = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
    h1 ^= Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2  = Math.imul(h2 ^ (h2 >>> 16), 2246822507);
    h2 ^= Math.imul(h1 ^ (h1 >>> 13), 3266489909);

    return 4294967296 * (2097151 & h2) + (h1 >>> 0);
};

const intToHSL = (val) => {
    const shortened = Math.imul(val, Math.imul(val, val)) % 360;
    return "hsla(" + shortened + ",100%,30%,20%)";
};

function map_course(c) {
    var result = Array();
    const {course, faculty, room, times, lab, lab_index, reserve_room_during_lab} = c;
    for (const t in times) {
        var entry = {...times[t]};
        entry['name'] = course;
        const isLab = Number(t) === lab_index;
        entry['room'] = entry.delivery === 'online' || (isLab && !reserve_room_during_lab) ? null : room;
        entry['faculty'] = faculty;
        result.push(entry);
    }
    if (lab) {
        var entry = {...times[lab_index]};
        entry['name'] = course;
        entry['room'] = lab;
        entry['faculty'] = faculty;
        result.push(entry);
    }
    return result;
}

function load_index(index) {
    document.getElementById("curr").textContent = (index + 1) + " of " + root_json.length;
    document.getElementById("next").disabled = index == root_json.length - 1;
    document.getElementById("prev").disabled = index == 0;
    curr_index = index;

    d3.select('#schedule').html("");

    const the_data = root_json[index].flatMap(map_course);

    for (const room of locations) {

        const div = d3.select("#schedule")
            .append("div");

        div.append("h2")
            .text(room);

        const days = div.append("div");

        days.append('div')
            .style('width', '40px')
            .style("display", "inline-block");
        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
        for (const i in DAYS) {
            days.append('span')
                .text(DAYS[i])
                .style("font-size", "10px")
                .style("width", "150px")
                .style("display", "inline-block")
                .style("text-align", "center");
        }

        const filtered = the_data.filter(x => x.room == room);
        const minHour = filtered.length
            ? Math.floor(Math.min(...filtered.map(x => x.start)) / 60)
            : 8;
        const maxHour = filtered.length
            ? Math.ceil(Math.max(...filtered.map(x => x.start + x.duration)) / 60)
            : 20;
        const gridEndHour = Math.max(maxHour, minHour + 1);
        const TIMES = Array.from(
            {length: gridEndHour - minHour + 1},
            (_, index) => minHour + index,
        );

        const svg = div.append("svg")
            .attr("width", 800)
            .attr("height", (gridEndHour - minHour) * 60);

        div.append("p")
            .style("page-break-after", "always");

        svg.selectAll('line')
            .data(TIMES)
            .enter()
            .append('line')
            .style("stroke", "lightgrey")
            .style("stroke-width", 1)
            .attr('x1', 0).attr('y1', d => (d - minHour) * 60)
            .attr('x2', 800).attr('y2', d => (d - minHour) * 60);
        svg.selectAll('text')
            .data(TIMES)
            .enter()
            .append('text')
            .attr('x', 0).attr('y', d => (d - minHour) * 60)
            .attr('dy', 12)
            .text(d => {
                const normalized = d % 24;
                const h = normalized % 12 || 12;
                const ap = normalized >= 12 ? "PM" : "AM";
                return h + ":00 " + ap;
            })
            .style("font-size", "10px");

        svg.selectAll('rect')
            .data(filtered)
            .enter()
            .append('rect')
            .attr('x', d => (d.day - 1) * 150 + 45 + 5)
            .attr('y', d => d.start - minHour * 60)
            .attr('width', 140)
            .attr('height', d => d.duration)
            .style('fill', d => intToHSL(getHashCode(d.faculty)))
            .style('stroke', 'black')
        const group = svg.selectAll('g')
            .data(filtered)
            .enter()
            .append('g');
        group.append('text')
            .attr('dy', 12)
            .attr('x', d => (d.day - 1) * 150 + 50 + 5)
            .attr('y', d => d.start - minHour * 60)
            .text(d => d.name)
            .style('font-weight', 700)
            .style("font-size", "12px");
        group.append('text')
            .attr('dy', 12)
            .attr('x', d => (d.day - 1) * 150 + 50 + 5)
            .attr('y', d => d.start - minHour * 60 + 15)
            .text(d => d.faculty)
            .style("font-size", "10px");
        group.append('text')
            .attr('dy', 12)
            .attr('x', d => (d.day - 1) * 150 + 50 + 5)
            .attr('y', d => d.start - minHour * 60 + 30)
            .text(d => {
                const fn = (t) => {
                    const hh = Math.floor(t / 60);
                    const mm = t % 60;
                    const normalized = hh % 24;
                    const h = normalized % 12 || 12;
                    const ap = normalized >= 12 ? "PM" : "AM";
                    return h + ":" + String(mm).padStart(2, '0') + " " + ap;
                };
                return fn(d.start) + " - " + fn(d.start + d.duration);
            })
            .style("font-size", "10px");
    }
}

function read_json(event) {
    try {
        const result = event.target.result;
        root_json = JSON.parse(result);
        if (!Array.isArray(root_json) || root_json.length === 0 || !root_json.every(Array.isArray)) {
            throw new Error("Expected a non-empty JSON array of schedules.");
        }
    } catch (error) {
        root_json = null;
        locations = null;
        curr_index = -1;
        document.getElementById('nav').style.display = "none";
        d3.select('#schedule').text(error instanceof Error ? error.message : "Invalid schedule JSON.");
        return;
    }
    rooms = new Set()
    labs = new Set()
    for (const i in root_json) {
        for (const c of root_json[i]) {
            if (c.room) {
                rooms.add(c.room);
            }
            if (c.lab) {
                labs.add(c.lab);
            }
        }
    }
    locations = Array.from(rooms).sort().concat(Array.from(labs).sort());
    document.getElementById('nav').style.display = "initial";
    load_index(0);
}

function file_reader() {
    if (this.files && this.files[0]) {
        const file = this.files[0];
        const reader = new FileReader();
        reader.addEventListener('load', read_json);
        reader.readAsText(file);
    }
}

document.getElementById('file-select').addEventListener("change", file_reader);
document.getElementById('nav').style.display = "none";
document.getElementById('prev').addEventListener("click", () => {
    load_index(curr_index - 1);
});
document.getElementById('next').addEventListener("click", () => {
    load_index(curr_index + 1);
});
        </script>
    </body>
</html>
